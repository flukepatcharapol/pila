# pytest.ini
#
# Global pytest configuration สำหรับ Studio Management automation tests
# ใช้ร่วมกันทุก layer: BE, FE, Integration
# เหตุผล: config ที่เดียวทำให้ทุก test runner ใช้ settings เดียวกัน

[pytest]

# ─── Test Discovery ──────────────────────────────────────────────────────────────

# tests ทั้งหมดอยู่ที่ root tests/ — ง่ายต่อการ scope และ develop
testpaths = tests

# pattern สำหรับหา test files
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─── Python Path ─────────────────────────────────────────────────────────────────

# เพิ่ม paths เพื่อให้ imports ทำงานได้:
# - backend/       → import api.*  (FastAPI app)
# - tests/be/      → import helpers.common_api
# - tests/fe/      → import helpers.common_web
# ใช้ namespace packages (ไม่มี __init__.py ใน helpers/) เพื่อให้ Python merge ทั้งสอง helpers/
pythonpath = backend tests/be tests/fe

# ─── Async Mode ──────────────────────────────────────────────────────────────────

# asyncio_mode=auto → test functions ที่ประกาศ async def จะทำงานเป็น async อัตโนมัติ
# ไม่ต้อง @pytest.mark.asyncio ทุก function (สะดวกมาก สำหรับ BE tests ที่ใช้ httpx async)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# ─── Markers ─────────────────────────────────────────────────────────────────────

# ประกาศ custom markers เพื่อจัด group tests
# ใช้รัน: pytest -m be  หรือ  pytest -m "fe and not slow"
markers =
    be: Backend API tests (pytest + httpx + Allure)
    fe: Frontend browser tests (Playwright + pytest)
    integration: Full-stack end-to-end tests
    security: Security-related tests (auth, injection, token isolation)
    slow: Tests ที่ใช้เวลานาน เช่น concurrent tests
    smoke: Minimal smoke tests สำหรับ CI quick check
    isolated_last: Medium Risk tests ที่ต้องรันหลังสุด (mutate shared state)

# ─── Output Format ────────────────────────────────────────────────────────────────

# -v → verbose (แสดงชื่อ test ทุกตัว)
# --tb=short → traceback แบบสั้น อ่านง่ายขึ้น
addopts = -v --tb=short

# ─── Allure ──────────────────────────────────────────────────────────────────────

# Allure results จะถูก save ที่ allure-results/
# รัน: pytest --alluredir=allure-results
# แล้ว: allure serve allure-results

# ─── Playwright ──────────────────────────────────────────────────────────────────

# FE tests ใช้ pytest-playwright
# ตั้ง base URL ผ่าน environment variable FE_BASE_URL ใน .env.test
