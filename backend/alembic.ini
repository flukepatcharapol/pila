# alembic.ini — Alembic configuration
# วางไว้ที่ backend/ เพื่อให้ `alembic` command หาเจอจาก backend directory

[alembic]
# path to migration scripts (relative to this file)
script_location = api/migrations

# ไม่ set DATABASE_URL ที่นี่ — ให้ env.py อ่านจาก environment variable แทน
# เหตุผล: ป้องกัน credentials รั่วใน git
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
