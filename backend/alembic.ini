# alembic.ini - Alembic configuration
# Place at backend/ so alembic command can find it from the backend directory

[alembic]
# path to migration scripts (relative to this file)
script_location = api/migrations

# DATABASE_URL is not set here - env.py reads from environment variable instead
# Reason: prevents credentials from leaking in git
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
